name: Build and Push Docker Image on Version Release (Manual)

"on":
  workflow_dispatch:
    inputs:
      release_tag:
        description: Version tag to use for the Docker image and Helm chart
        required: true
        default: v0.0.0-dev

env:
  IMAGE_NAME: garmin-fetch-data
  IMAGE_TAG: ${{ inputs.release_tag }}
  IMAGE_REPO: thisisarpanghosh
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build_and_push:
    name: Build Multi-Arch Docker Image and Push to Docker Hub & GHCR
    if: ${{ github.repository == format('{0}/garmin-grafana', vars.IMAGE_REPO || 'arpanghosh8453') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image metadata
        id: meta
        run: |
          echo "image_tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          echo "image_owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io 
          username: ${{ github.repository_owner}}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU for Multi-Architecture Support
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Multi-Arch Image (linux/amd64, linux/arm64) and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ vars.IMAGE_REPO || env.IMAGE_REPO }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ steps.meta.outputs.image_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}

      - name: Build Helm Chart
        run: |
          cd k8s
          helm plugin install https://github.com/melmorabity/helm-kubeconform --version 0.6.4.1
          helm dependency build
          helm kubeconform --skip CustomResourceDefinition --summary .
          helm package . -d helm/charts --version ${{ steps.meta.outputs.image_tag }}-helm
          helm repo index helm/charts --url https://${{ vars.IMAGE_REPO || env.IMAGE_REPO }}.github.io/garmin-grafana
          helm push helm/charts/garmin-grafana-${{ steps.meta.outputs.image_tag }}-helm.tgz \
              oci://registry-1.docker.io/${{ vars.IMAGE_REPO || env.IMAGE_REPO }}
          helm push helm/charts/garmin-grafana-${{ steps.meta.outputs.image_tag }}-helm.tgz \
              oci://ghcr.io/${{ steps.meta.outputs.image_owner }}/